version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: zapagent-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: zapagent-evolution
    ports:
      - '8080:8080'
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=zapagent-secret-key-change-in-prod
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=mongodb://mongo:27017/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - WEBHOOK_GLOBAL_ENABLED=false
      - CONFIG_SESSION_PHONE_CLIENT=ZapAgent
    depends_on:
      - redis
      - mongo
    volumes:
      - evolution_instances:/evolution/instances

  mongo:
    image: mongo:6
    container_name: zapagent-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  redis_data:
  mongo_data:
  evolution_instances:
